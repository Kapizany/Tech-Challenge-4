name: Build and Push API Image to ECR

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  AWS_REGION: us-east-1
  AWS_ACCOUNT_ID: "447798043017"
  ECR_REPOSITORY: techchallenge/stock-forecast-api
  IMAGE_TAG: latest
  RUNTIME_SECRET_NAME: stock-forecast-api-prod/runtime-config
  ECS_CLUSTER: stock-forecast-api-prod-cluster
  ECS_SERVICE: stock-forecast-api-prod-service

permissions:
  contents: read
  id-token: write

jobs:
  build-and-push:
    name: Build and push Docker image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show GitHub OIDC context
        run: |
          echo "repository=${{ github.repository }}"
          echo "ref=${{ github.ref }}"
          echo "event=${{ github.event_name }}"

      - name: Validate AWS role secret
        env:
          ROLE_TO_ASSUME: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          EXPECTED_ROLE_ARN: arn:aws:iam::447798043017:role/stock-forecast-api-prod-github-actions-role
        run: |
          if [ -z "$ROLE_TO_ASSUME" ]; then
            echo "::error::Repository secret AWS_ROLE_TO_ASSUME is empty or missing."
            exit 1
          fi

          echo "::add-mask::$ROLE_TO_ASSUME"
          echo "role_account=$(cut -d: -f5 <<< "$ROLE_TO_ASSUME")"
          echo "role_name=${ROLE_TO_ASSUME##*/}"

          if [ "$ROLE_TO_ASSUME" != "$EXPECTED_ROLE_ARN" ]; then
            echo "::error::AWS_ROLE_TO_ASSUME does not match the Terraform GitHub Actions role ARN."
            echo "expected_role_name=${EXPECTED_ROLE_ARN##*/}"
            exit 1
          fi

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}

      - name: Load runtime config from Secrets Manager
        shell: bash
        run: |
          secret_json="$(aws secretsmanager get-secret-value \
            --secret-id "$RUNTIME_SECRET_NAME" \
            --query SecretString \
            --output text \
            --region "$AWS_REGION")"

          for key in DATA_S3_BUCKET DATA_S3_PREFIX MODELS_S3_BUCKET MODELS_S3_PREFIX; do
            value="$(jq -r --arg key "$key" '.[$key] // empty' <<< "$secret_json")"
            if [ -n "$value" ]; then
              echo "::add-mask::$value"
              echo "$key=$value" >> "$GITHUB_ENV"
            fi
          done

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Ensure ECR repository exists
        run: |
          aws ecr describe-repositories \
            --repository-names "$ECR_REPOSITORY" \
            --region "$AWS_REGION" \
          || aws ecr create-repository \
            --repository-name "$ECR_REPOSITORY" \
            --image-scanning-configuration scanOnPush=true \
            --region "$AWS_REGION"

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ steps.ecr-login.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ env.IMAGE_TAG }}
            ${{ steps.ecr-login.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ github.sha }}

      - name: Force ECS deployment
        run: |
          aws ecs update-service \
            --cluster "$ECS_CLUSTER" \
            --service "$ECS_SERVICE" \
            --force-new-deployment \
            --region "$AWS_REGION"

          aws ecs wait services-stable \
            --cluster "$ECS_CLUSTER" \
            --services "$ECS_SERVICE" \
            --region "$AWS_REGION"
